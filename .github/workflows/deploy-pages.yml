name: Deploy report to GitHub Pages

# Triggered when you push the generated report (site/public/results.json) to main,
# or manually from the Actions tab. The workflow builds the static Next.js site
# under /site/out and deploys it to GitHub Pages.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; cancel in-progress runs from earlier pushes.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm install

      # When deploying to https://<user>.github.io/<repo>/ we need to set BASE_PATH=/<repo>.
      # github.event.repository.name is the repo's short name.
      - name: Build (with basePath)
        working-directory: site
        env:
          BASE_PATH: /${{ github.event.repository.name }}
        run: npm run build

      - name: Disable Jekyll
        run: touch site/out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
