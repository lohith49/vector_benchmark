apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qdrant-data
  namespace: vectorbench
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: qdrant
  namespace: vectorbench
spec:
  serviceName: qdrant
  replicas: 1
  selector:
    matchLabels: { app: qdrant }
  template:
    metadata:
      labels: { app: qdrant }
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:v1.12.4
          ports:
            - { containerPort: 6333, name: http }
            - { containerPort: 6334, name: grpc }
          env:
            - { name: QDRANT__SERVICE__HTTP_PORT, value: "6333" }
            - { name: QDRANT__SERVICE__GRPC_PORT, value: "6334" }
            - { name: QDRANT__LOG_LEVEL, value: "INFO" }
          readinessProbe:
            httpGet: { path: /readyz, port: 6333 }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /livez, port: 6333 }
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests: { cpu: "500m", memory: "1Gi" }
            limits:   { cpu: "2",    memory: "2Gi" }
          volumeMounts:
            - { name: data, mountPath: /qdrant/storage }
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: qdrant-data }
---
apiVersion: v1
kind: Service
metadata:
  name: qdrant
  namespace: vectorbench
spec:
  type: NodePort
  selector: { app: qdrant }
  ports:
    - { name: http, port: 6333, targetPort: 6333, nodePort: 30633 }
    - { name: grpc, port: 6334, targetPort: 6334, nodePort: 30634 }
