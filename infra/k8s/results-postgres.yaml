apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: results-postgres-data
  namespace: vectorbench
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: results-postgres
  namespace: vectorbench
spec:
  serviceName: results-postgres
  replicas: 1
  selector:
    matchLabels: { app: results-postgres }
  template:
    metadata:
      labels: { app: results-postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - { containerPort: 5432, name: pg }
          env:
            - { name: POSTGRES_DB,       value: results }
            - { name: POSTGRES_USER,     value: results }
            - { name: POSTGRES_PASSWORD, value: results }
            - { name: PGDATA,            value: /var/lib/postgresql/data/pgdata }
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "results", "-d", "results"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests: { cpu: "50m",  memory: "64Mi" }
            limits:   { cpu: "1",    memory: "512Mi" }
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: results-postgres-data }
---
apiVersion: v1
kind: Service
metadata:
  name: results-postgres
  namespace: vectorbench
spec:
  type: NodePort
  selector: { app: results-postgres }
  ports:
    - { name: pg, port: 5432, targetPort: 5432, nodePort: 30433 }
