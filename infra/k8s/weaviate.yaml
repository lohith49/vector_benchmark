apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: weaviate-data
  namespace: vectorbench
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: weaviate
  namespace: vectorbench
spec:
  serviceName: weaviate
  replicas: 1
  selector:
    matchLabels: { app: weaviate }
  template:
    metadata:
      labels: { app: weaviate }
    spec:
      containers:
        - name: weaviate
          image: cr.weaviate.io/semitechnologies/weaviate:1.27.6
          command: ["/bin/weaviate"]
          args:
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8080"
            - "--scheme"
            - "http"
          ports:
            - { containerPort: 8080,  name: http }
            - { containerPort: 50051, name: grpc }
          env:
            - { name: QUERY_DEFAULTS_LIMIT,                 value: "25" }
            - { name: AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED, value: "true" }
            - { name: PERSISTENCE_DATA_PATH,                value: "/var/lib/weaviate" }
            - { name: DEFAULT_VECTORIZER_MODULE,            value: "none" }
            - { name: ENABLE_MODULES,                       value: "" }
            - { name: CLUSTER_HOSTNAME,                     value: "node1" }
            - { name: DISABLE_TELEMETRY,                    value: "true" }
          readinessProbe:
            httpGet: { path: /v1/.well-known/ready, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /v1/.well-known/live, port: 8080 }
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests: { cpu: "500m", memory: "1Gi" }
            limits:   { cpu: "2",    memory: "2Gi" }
          volumeMounts:
            - { name: data, mountPath: /var/lib/weaviate }
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: weaviate-data }
---
apiVersion: v1
kind: Service
metadata:
  name: weaviate
  namespace: vectorbench
spec:
  type: NodePort
  selector: { app: weaviate }
  ports:
    - { name: http, port: 8080,  targetPort: 8080,  nodePort: 30080 }
    - { name: grpc, port: 50051, targetPort: 50051, nodePort: 30051 }
